[project]
name = "airx"
version = "0.1.0"
description = "AIX is an AI-oriented symbolic programming language frontend"
readme = "README.md"
authors = [
  {name = "Ivan Ogasawara", email = "ivan.ogasawara@gmail.com"}
]
license = "Apache-2.0"
requires-python = ">=3.10,<4"
dependencies = [
  "pyyaml >=4",
  "astx == 1.23.1",
  "pyirx == 1.23.1",
  "jsonschema (>=4.0.0)",
  "packaging >=23",
  "types-pyyaml (>=6.0.12.20250516)",
  "tomli >=2.0.0 ; python_version < \"3.11\""
]

[project.scripts]
"aix" = "aix.__main__:app"

[build-system]
requires = ["poetry-core>=2"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
include = [
  "src/aix",
  "src/aix/builtins/**/*.aix",
  "src/aix/builtins/**/*.x",
  "src/aix/schema/*.json",
  "src/aix/py.typed",
  "src/aix/lexer/syntax.json",
  "src/aix/stdlib/**/*.aix",
  "src/aix/stdlib/**/*.x",
]
exclude = [
  ".git/*",
  ".env*",
]
packages = [
  {include = "aix", from="src"},
]

[tool.pytest.ini_options]
testpaths = [
    "tests/python",
]
filterwarnings = [
    "error::RuntimeWarning",
    "error::typeguard.TypeHintWarning",
]

[tool.bandit]
exclude_dirs = ["tests"]
targets = "./"

[tool.vulture]
exclude = ["tests"]
ignore_decorators = ["abc.abstractmethod"]
ignore_names = []
make_whitelist = true
min_confidence = 80
paths = ["./"]
sort_by_size = true
verbose = false

[tool.ruff]
target-version = "py310"
line-length = 79
force-exclude = true
src = ["./"]
exclude = [
  'docs',
]
fix = true

[tool.ruff.lint]
ignore = [
  "F811",
  "PLR0911",
  "PLR0912",
  "PLR0913",
  "RUF012",
  "PLR0915",
  "PLR2004",
  "PLC0415",
]
select = [
  "E",
  "F",
  "YTT",
  "PL",
  "RUF",
  "I001",
]
extend-select = [
  "UP006",
  "UP007",
]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.ruff.lint.isort]
lines-between-types = 1

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.10"
check_untyped_defs = true
strict = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
show_error_codes = true
exclude = ["scripts/"]
