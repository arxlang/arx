groups:
  default:
    tasks:
      clean:
        help: remove build artifacts, compiled files, and cache
        run: |
          rm -fr build/
          rm -fr dist/
          rm -fr packages/*/dist/
          rm -fr .eggs/
          find . -name '*.egg-info' -exec rm -fr {} +
          find . -name '*.egg' -exec rm -f {} +
          find . -name '*.pyc' -exec rm -f {} +
          find . -name '__pycache__' -exec rm -fr {} +
          find . -name '*.pyo' -exec rm -f {} +
          find . -name '*~' -exec rm -f {} +
          rm -f .coverage
          rm -fr htmlcov/
          rm -fr .pytest_cache

  all:
    tasks:
      unittests:
        help: run all package unit tests with aggregate coverage
        args:
          path:
            help: Specify the location of the tests
            type: string
            default: "packages/arx/tests/python packages/astx/tests packages/irx/tests"
          params:
            help: Specify parameters to be used for tests
            type: string
            default: "-vv"
        run: |
          pytest \
            --cov=arx \
            --cov=astx \
            --cov=irx \
            --cov-fail-under=85 \
            --cov-report term-missing \
            --no-cov-on-fail \
            ${{ args.path }} \
            ${{ args.params }}

      lint:
        help: run all lint and pre-commit checks
        run: |
          pre-commit install
          pre-commit run --all-files

      typecheck:
        help: run type checks for every package
        hooks:
          pre-run:
            - task: arx.typecheck
            - task: astx.typecheck
            - task: irx.typecheck

      build:
        help: build all packages
        run: ./scripts/build.sh

      ci:
        help: run the same checks executed on CI
        hooks:
          pre-run:
            - task: all.unittests
            - task: arx.test-compiled
            - task: arx.test-smoke
            - task: arx.check-syntax
            - task: all.typecheck
            - task: all.lint

  arx:
    tasks:
      unittests:
        help: run Arx Python unit tests
        args:
          path:
            help: Specify the location of the tests
            type: string
            default: "packages/arx/tests/python"
          params:
            help: Specify parameters to be used for tests
            type: string
            default: "-vv"
        run: pytest ${{ args.path }} ${{ args.params }}

      test-compiled:
        help: run compiled Arx language tests
        run: arx test packages/arx/tests/arx

      test-smoke:
        help: run Arx CLI smoke tests against examples
        hooks:
          pre-run:
            - task: arx.show-tokens
              args:
                examples: constant,average,fibonacci,print-star,sum,irx-feature-proposal,classes
            - task: arx.show-ast
              args:
                examples: constant,average,fibonacci,print-star,sum,irx-feature-proposal,classes
            - task: arx.show-llvm-ir
              args:
                examples: constant,average,fibonacci,print-star,sum,classes
            - task: arx.emit-object
              args:
                examples: constant,average,fibonacci,print-star,sum,classes
        run: |
          arx --help
          arx --version

      check-syntax:
        help: validate the Arx lexer syntax manifest
        run: python -m json.tool packages/arx/src/arx/lexer/syntax.json

      format:
        help: format Arx Python files
        run: pre-commit run ruff-format-arx --all-files

      lint:
        help: run Arx package lint hooks
        run: |
          pre-commit run ruff-check-arx --all-files
          pre-commit run douki-arx --all-files
          pre-commit run bandit-arx --all-files
          pre-commit run vulture-arx --all-files
          pre-commit run mccabe-arx --all-files

      typecheck:
        help: run Arx type checks
        run: |
          cd packages/arx
          mypy src

      build:
        help: build the Arx package
        run: |
          cd packages/arx
          poetry build

      ci:
        help: run Arx package CI checks
        hooks:
          pre-run:
            - task: arx.unittests
            - task: arx.test-compiled
            - task: arx.test-smoke
            - task: arx.check-syntax
            - task: arx.typecheck
            - task: arx.lint
            - task: arx.build

      show-tokens:
        help: emit tokens for Arx example files
        args:
          examples:
            help: The example names separated by comma `,`
            type: string
            required: true
        run: |
          import subprocess

          for name in "${{ args.examples }}".split(","):
            print(f" show tokens: {name} ".center(80, "="))
            result = subprocess.run(
              ["arx", "--show-tokens", f"examples/{name}.x"],
              capture_output=True,
              text=True,
              check=True,
            )
            output = result.stdout.strip()
            if not output:
              raise RuntimeError(f"show-tokens produced no output for: {name}")
            print(output)

      show-ast:
        help: emit AST output for Arx example files
        args:
          examples:
            help: The example names separated by comma `,`
            type: string
            required: true
        run: |
          import subprocess

          for name in "${{ args.examples }}".split(","):
            print(f" show ast: {name} ".center(80, "="))
            result = subprocess.run(
              ["arx", "--show-ast", f"examples/{name}.x"],
              capture_output=True,
              text=True,
              check=True,
            )
            output = result.stdout.strip()
            if not output:
              raise RuntimeError(f"show-ast produced no output for: {name}")
            if output == "Block":
              raise RuntimeError(
                "show-ast regression: got only 'Block'. "
                f"example={name}"
              )
            print(output)

      show-llvm-ir:
        help: emit LLVM IR for Arx example files
        args:
          examples:
            help: The example names separated by comma `,`
            type: string
            required: true
        run: |
          import subprocess

          for name in "${{ args.examples }}".split(","):
            print(f" show llvm ir: {name} ".center(80, "="))
            result = subprocess.run(
              ["arx", "--show-llvm-ir", f"examples/{name}.x"],
              capture_output=True,
              text=True,
              check=True,
            )
            output = result.stdout.strip()
            if "; ModuleID" not in output:
              raise RuntimeError(
                "show-llvm-ir output missing LLVM header for: "
                f"{name}"
              )
            print(output)

      emit-object:
        help: emit object artifacts for Arx example files
        args:
          examples:
            help: The example names separated by comma `,`
            type: string
            required: true
        run: |
          import subprocess

          from pathlib import Path

          output_dir = Path("build/smoke")
          output_dir.mkdir(parents=True, exist_ok=True)

          for name in "${{ args.examples }}".split(","):
            print(f" emit object: {name} ".center(80, "="))
            output_file = output_dir / name
            if output_file.exists():
              output_file.unlink()
            subprocess.run(
              [
                "arx",
                f"examples/{name}.x",
                "--lib",
                "--output-file",
                str(output_file),
              ],
              check=True,
            )
            if not output_file.exists() or output_file.stat().st_size == 0:
              raise RuntimeError(
                "emit-object did not produce a valid artifact for: "
                f"{name}"
              )
            print(str(output_file))

  astx:
    tasks:
      unittests:
        help: run ASTx unit tests
        args:
          path:
            help: Specify the location of the tests
            type: string
            default: "packages/astx/tests"
          params:
            help: Specify parameters to be used for tests
            type: string
            default: "-vv"
        run: pytest ${{ args.path }} ${{ args.params }}

      format:
        help: format ASTx Python files
        run: pre-commit run ruff-format-astx --all-files

      lint:
        help: run ASTx package lint hooks
        run: |
          pre-commit run ruff-check-astx --all-files
          pre-commit run douki-astx --all-files
          pre-commit run bandit-astx --all-files
          pre-commit run vulture-astx --all-files
          pre-commit run mccabe-astx --all-files

      typecheck:
        help: run ASTx type checks
        run: |
          cd packages/astx
          mypy src

      build:
        help: build the ASTx package
        run: |
          cd packages/astx
          poetry build

      ci:
        help: run ASTx package CI checks
        hooks:
          pre-run:
            - task: astx.unittests
            - task: astx.typecheck
            - task: astx.lint
            - task: astx.build

  irx:
    tasks:
      unittests:
        help: run IRx unit tests
        args:
          path:
            help: Specify the location of the tests
            type: string
            default: "packages/irx/tests"
          params:
            help: Specify parameters to be used for tests
            type: string
            default: "-vv"
        run: pytest ${{ args.path }} ${{ args.params }}

      test-analysis:
        help: run IRx semantic-analysis tests
        args:
          path:
            help: Specify the location of the tests
            type: string
            default: "packages/irx/tests/analysis"
          params:
            help: Specify parameters to be used for tests
            type: string
            default: "-vv"
        run: pytest ${{ args.path }} ${{ args.params }}

      format:
        help: format IRx Python files
        run: pre-commit run ruff-format-irx --all-files

      lint:
        help: run IRx package lint hooks
        run: |
          pre-commit run ruff-check-irx --all-files
          pre-commit run douki-irx --all-files
          pre-commit run bandit-irx --all-files
          pre-commit run vulture-irx --all-files
          pre-commit run mccabe-irx --all-files

      typecheck:
        help: run IRx type checks
        run: |
          cd packages/irx
          mypy src

      build:
        help: build the IRx package
        run: |
          cd packages/irx
          poetry build

      ci:
        help: run IRx package CI checks
        hooks:
          pre-run:
            - task: irx.unittests
            - task: irx.test-analysis
            - task: irx.typecheck
            - task: irx.lint
            - task: irx.build

  docs:
    tasks:
      build:
        help: build documentation
        run: |
          mkdocs build --config-file mkdocs.yaml
          echo "arxlang.org" > ./build/CNAME

      preview:
        help: preview documentation page locally
        run: mkdocs serve --watch docs --config-file mkdocs.yaml

  release:
    vars:
      app: |
        npx --yes \
          -p semantic-release \
          -p conventional-changelog-conventionalcommits \
          -p "@semantic-release/commit-analyzer" \
          -p "@semantic-release/release-notes-generator" \
          -p "@semantic-release/changelog" \
          -p "@semantic-release/exec" \
          -p "@semantic-release/github" \
          -p "@semantic-release/git" \
          -p "@google/semantic-release-replace-plugin" \
          semantic-release

    tasks:
      ci:
        help: run semantic release on CI
        run: ${{ vars.app }} --ci

      dry-run:
        help: run semantic release in dry-run mode
        run: |
          ${{ vars.app }} --dry-run
