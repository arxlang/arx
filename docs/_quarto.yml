project:
  type: website
  output-dir: _site
  pre-render:
    - python ../scripts/gen_api_docs.py

website:
  title: ArxLang
  site-url: https://arxlang.org
  repo-url: https://github.com/arxlang/arx
  favicon: favicon.ico
  page-footer: "Copyright &copy; 2022, ArxLang Team"
  navbar:
    logo: images/arx.png
    right:
      - icon: github
        href: https://github.com/arxlang/arx
      - text: Community
        href: discord.md
  sidebar:
    style: docked
    search: true
    contents:
      - text: Home
        href: index.md
      - text: Getting Started
        href: getting-started.md
      - section: Library
        contents:
          - text: Overview
            href: library/index.md
          - text: Modules
            href: library/modules.md
          - text: Functions
            href: library/functions.md
          - text: Classes
            href: library/classes.md
          - text: Data Types
            href: library/datatypes.md
          - text: Built-in Types
            href: library/built-in-types.md
          - text: Control Flow
            href: library/control-flow.md
          - text: Docstrings
            href: library/docstrings.md
      - section: ASTx
        contents:
          - text: Overview
            href: astx/index.md
          - text: Installation
            href: astx/installation.md
          - text: Conventions
            href: astx/conventions.md
          - text: Contributing
            href: astx/contributing.md
          - section: Tutorials
            contents:
              - text: Getting Started
                href: astx/tutorials/get-started.ipynb
              - text: Literals
                href: astx/tutorials/literals.ipynb
              - text: Variables
                href: astx/tutorials/variables.ipynb
              - text: Functions
                href: astx/tutorials/functions.ipynb
              - text: For Loops
                href: astx/tutorials/for-loop.ipynb
              - text: Context
                href: astx/tutorials/context.ipynb
              - text: Fibonacci
                href: astx/tutorials/fibonacci.ipynb
          - text: Historical Changelog
            href: astx/changelog.md
      - section: IRx
        contents:
          - text: Overview
            href: irx/index.md
          - text: Installation
            href: irx/installation.md
          - text: Architecture
            href: irx/architecture.md
          - text: Semantic Contract
            href: irx/semantic-contract.md
          - text: Runtime Features
            href: irx/runtime-features.md
          - text: Buffer View Model
            href: irx/buffer-view-model.md
          - text: Class Model
            href: irx/class-model.md
          - text: Contributing
            href: irx/contributing.md
          - section: Tutorials
            contents:
              - text: Getting Started
                href: irx/tutorials/get-started.ipynb
          - text: Historical Changelog
            href: irx/changelog.md
      - text: API Docs
        href: api/index.md
      - text: Syntax
        href: syntax.md
      - text: Roadmap
        href: roadmap.md
      - text: Contributing Guide
        href: contributing.md
      - text: Sponsor
        href: sponsor.md
      - text: Partners
        href: partners.md
      - text: Code of Conduct
        href: coc.md
      - text: Community
        href: discord.md
      - text: Governance
        href: governance.md
      - text: Changelog
        href: changelog.md

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true

execute:
  enabled: false
